name: SDN制裁名单定时监测
on:
  # 👇 定时任务（北京时间 9:00 / 16:00 自动执行）
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
  # 👇 手动触发按钮（核心！点击即可运行）
  workflow_dispatch:

jobs:
  check-sdn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装项目依赖
        run: pip install -r requirements.txt

      - name: 运行监测脚本
        run: python check_sdn.py
        env:
          PYTHONUNBUFFERED: 1

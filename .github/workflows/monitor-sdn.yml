name: SDN Sanctions Monitor

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 北京时间工作日上午 9:00
  workflow_dispatch:

# 强制使用 Node.js 24（解决警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          # 使用 rapidfuzz 替代 fuzzywuzzy（无需 C++ 编译器，更稳定）
          pip install requests websocket-client rapidfuzz
          
      - name: Restore previous state
        id: cache-state
        uses: actions/cache@v4  # 升级到 v4（支持 Node.js 24）
        with:
          path: data/last_check.json
          key: sdn-monitor-state-${{ github.run_id }}
          restore-keys: |
            sdn-monitor-state-
            
      - name: Run SDN check
        env:
          WECOM_BOT_ID: ${{ secrets.WECOM_BOT_ID }}
          WECOM_SECRET: ${{ secrets.WECOM_SECRET }}
          WECOM_RECV_ID: ${{ secrets.WECOM_RECV_ID }}
        run: |
          python scripts/check_sdn.py
          
      - name: Debug - List files if failed
        if: failure()
        run: |
          echo "=== Debugging ==="
          ls -la
          ls -la data/ || echo "data dir not found"
          cat data/last_check.json 2>/dev/null || echo "No state file"

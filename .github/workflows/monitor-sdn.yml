name: SDN Sanctions Monitor

on:
  schedule:
    # 北京时间工作日上午 9:00 (UTC 01:00)
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

env:
  # 强制使用 Node.js 24（消除警告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests rapidfuzz
      
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: data/last_check.json
          key: sdn-state-${{ github.run_id }}
          restore-keys: |
            sdn-state-
      
      - name: Run SDN check
        env:
          # 只需配置这一个 Secret！
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
        run: |
          python scripts/check_sdn.py
      
      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: data/last_check.json
          key: sdn-state-${{ github.run_id }}

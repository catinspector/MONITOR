name: SDN制裁名单定时监测
on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '30 3 * * *'   # 北京时间
    - cron: '0 8 * * *'   # 北京时间 16:00

  workflow_dispatch:

jobs:
  check-sdn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装项目依赖
        run: pip install -r requirements.txt

      - name: 运行监测脚本
        run: python scripts/check_sdn.py
        env:
          PYTHONUNBUFFERED: 1
          # 👇 注入企业微信密钥（从GitHub Secrets读取）
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
